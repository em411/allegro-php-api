name: Update API Client

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force regeneration even if spec is unchanged'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: api-client-update
  cancel-in-progress: false

env:
  REMOTE_API_URL: https://developer.allegro.pl/swagger.yaml
  OASDIFF_VERSION: v1.11.10
  PHP_VERSION: '8.5'
  TEMP_DIR: .tmp            # keep throwaway files out of project root

jobs:
  generate-sdk:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── Bootstrap ──────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0     # needed so the tag action can see history

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          tools: composer, parallel-lint

      - name: Cache Composer packages
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install Dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      # ── Download & validate spec ───────────────────────
      - name: Download Remote OpenAPI Spec
        run: |
          mkdir -p "$TEMP_DIR"
          curl -fSL --retry 5 --retry-delay 10 --retry-max-time 120 \
            --connect-timeout 15 --max-time 60 \
            -A "GitHubActions-AllegroSDK/1.0 (+https://github.com/${{ github.repository }})" \
            -o "$TEMP_DIR/new_spec.yaml" "$REMOTE_API_URL"

      - name: Validate downloaded spec
        run: |
          FILE="$TEMP_DIR/new_spec.yaml"

          # Must be at least 10 KB (a real spec)
          MIN_SIZE=10240
          FILE_SIZE=$(stat --printf='%s' "$FILE")
          if [ "$FILE_SIZE" -lt "$MIN_SIZE" ]; then
            echo "::error::Downloaded file is suspiciously small (${FILE_SIZE} bytes)"
            exit 1
          fi

          # Validate YAML structure and that it's actually an OpenAPI/Swagger doc
          python3 -c "
          import yaml, sys
          with open('$FILE') as f:
              doc = yaml.safe_load(f)
          if not isinstance(doc, dict):
              print('::error::Spec is not a YAML mapping', file=sys.stderr)
              sys.exit(1)
          if 'openapi' not in doc and 'swagger' not in doc:
              print('::error::Missing openapi/swagger version key', file=sys.stderr)
              sys.exit(1)
          if 'paths' not in doc:
              print('::error::Missing paths key', file=sys.stderr)
              sys.exit(1)
          print(f'✅ Valid spec — {len(doc.get(\"paths\", {}))} paths found')
          "

      # ── Compare specs ──────────────────────────────────
      - name: Check for spec changes
        id: spec_check
        run: |
          FORCE="${{ inputs.force }}"
          if [ "$FORCE" = "true" ]; then
            echo "⚡ Forced run — skipping diff."
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -f "resources/spec.yaml" ]; then
            OLD=$(sha256sum resources/spec.yaml | awk '{print $1}')
            NEW=$(sha256sum "$TEMP_DIR/new_spec.yaml" | awk '{print $1}')
            if [ "$OLD" = "$NEW" ]; then
              echo "🟢 Spec unchanged — nothing to do."
              echo "changed=false" >> "$GITHUB_OUTPUT"
              echo "### 🟢 Spec Unchanged" >> "$GITHUB_STEP_SUMMARY"
              echo "The remote spec hash matches the committed spec. No update needed." >> "$GITHUB_STEP_SUMMARY"
              exit 0
            fi
          else
            echo "📄 No existing spec found — treating as initial import."
          fi
          echo "changed=true" >> "$GITHUB_OUTPUT"

      # ── Pre-pull oasdiff image once ────────────────────
      - name: Pull oasdiff image
        if: steps.spec_check.outputs.changed == 'true' && hashFiles('resources/spec.yaml') != ''
        run: docker pull "tufin/oasdiff:${OASDIFF_VERSION}"

      # ── Semantic version detection ─────────────────────
      - name: Detect Semantic Version Bump
        id: versioning
        if: steps.spec_check.outputs.changed == 'true'
        run: |
          BUMP_TYPE="patch"
          RELEASE_NOTES="$TEMP_DIR/release_notes.md"

          cat <<'EOF' > "$RELEASE_NOTES"
          Automatic update triggered by changes in the remote Allegro API definition.

          EOF

          if [ ! -f "resources/spec.yaml" ]; then
            echo "📄 Initial import — defaulting to **patch**."
            echo "### 📄 Initial Import" >> "$RELEASE_NOTES"
            echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          OASDIFF="docker run --rm -v ${{ github.workspace }}:/work tufin/oasdiff:${OASDIFF_VERSION}"

          echo "Running oasdiff breaking check..."

          set +e
          $OASDIFF breaking /work/resources/spec.yaml "/work/$TEMP_DIR/new_spec.yaml" \
            > "$TEMP_DIR/breaking_diff.txt" 2>&1
          RC=$?
          set -e

          if [ "$RC" -ge 2 ]; then
            echo "::error::oasdiff 'breaking' failed with exit code $RC"
            cat "$TEMP_DIR/breaking_diff.txt"
            exit 1
          fi

          if [ "$RC" -eq 1 ]; then
            echo "🚨 Breaking changes detected → MAJOR"
            BUMP_TYPE="major"
            {
              echo "### 🚨 Breaking API Changes"
              echo '```text'
              cat "$TEMP_DIR/breaking_diff.txt"
              echo '```'
            } >> "$RELEASE_NOTES"
          else
            echo "Running oasdiff changelog..."

            $OASDIFF changelog /work/resources/spec.yaml "/work/$TEMP_DIR/new_spec.yaml" \
              --format json > "$TEMP_DIR/changelog.json"
            $OASDIFF changelog /work/resources/spec.yaml "/work/$TEMP_DIR/new_spec.yaml" \
              > "$TEMP_DIR/changelog.txt"

            # level 3 = INFO → new endpoints / features → MINOR
            if jq -e 'if type == "array" then [.[] | select(.level == 3)] | length > 0 else false end' \
                "$TEMP_DIR/changelog.json" >/dev/null 2>&1; then
              echo "✨ New features detected → MINOR"
              BUMP_TYPE="minor"
              echo "### ✨ New API Features" >> "$RELEASE_NOTES"
            else
              echo "🐛 Non-breaking fixes → PATCH"
              BUMP_TYPE="patch"
              echo "### 🐛 Non-Breaking Changes" >> "$RELEASE_NOTES"
            fi

            {
              echo '```text'
              cat "$TEMP_DIR/changelog.txt"
              echo '```'
            } >> "$RELEASE_NOTES"
          fi

          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

          # Job summary
          {
            echo "### Version Bump: \`$BUMP_TYPE\`"
            cat "$RELEASE_NOTES"
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Generate code ──────────────────────────────────
      - name: Replace spec and generate code
        if: steps.spec_check.outputs.changed == 'true'
        run: |
          cp "$TEMP_DIR/new_spec.yaml" resources/spec.yaml
          vendor/bin/jane-openapi generate --config-file=.jane-openapi.php

      # ── Validate generated code ────────────────────────
      - name: Validate generated code
        if: steps.spec_check.outputs.changed == 'true'
        run: parallel-lint --no-colors -e php generated/

      # ── Commit, tag, release ───────────────────────────
      - name: Commit Changes
        id: auto-commit
        if: steps.spec_check.outputs.changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "feat: synchronize with remote API spec"
          file_pattern: 'generated/** resources/spec.yaml'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

      - name: Bump version and push tag
        id: tag_version
        if: steps.auto-commit.outputs.changes_detected == 'true'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ steps.versioning.outputs.bump_type }}
          release_branches: main

      - name: Create GitHub Release
        if: steps.auto-commit.outputs.changes_detected == 'true' && steps.tag_version.outputs.new_tag
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          bodyFile: ${{ env.TEMP_DIR }}/release_notes.md

      # ── Cleanup ────────────────────────────────────────
      - name: Cleanup temporary files
        if: always()
        run: rm -rf "$TEMP_DIR"
